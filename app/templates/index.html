<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Scraping Tool</title>

    <link
      rel="icon"
      href="{{ url_for('static', filename='icon.png') }}"
      type="image/x-icon"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/wallpaper.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/footer.css') }}"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


    <style>
      .loader {
        width: 60px;
        aspect-ratio: 1;
        color: #FFCC00;
        background:
          linear-gradient(currentColor 0 0) 100%  0,
          linear-gradient(currentColor 0 0) 0  100%;
        background-size: 50.1% 50.1%;
        background-repeat: no-repeat;
        animation:  l7-0 1s infinite steps(1);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: none;
      }
      .loader::before,
      .loader::after {
        content:"";
        position: absolute;
        inset: 0 50% 50% 0;
        background: currentColor;
        transform: scale(var(--s,1)) perspective(150px) rotateY(0deg);
        transform-origin: bottom right; 
        animation: l7-1 .5s infinite linear alternate;
      }
      .loader::after {
        --s:-1,-1;
      }
      @keyframes l7-0 {
        0%  {transform: scaleX(1)  rotate(0deg)}
        50% {transform: scaleX(-1) rotate(-90deg)}
      }
      @keyframes l7-1 {
        49.99% {transform:scale(var(--s,1)) perspective(150px) rotateX(-90deg) ;filter:grayscale(0)}
        50%    {transform:scale(var(--s,1)) perspective(150px) rotateX(-90deg) ;filter:grayscale(0.8)}
        100%   {transform:scale(var(--s,1)) perspective(150px) rotateX(-180deg);filter:grayscale(0.8)}
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-heading-container">
        <img
          src="{{ url_for('static', filename='icon.png') }}"
          alt="Icon"
          width="40"
        />
        <h1>Date Scraping Tool</h1>
      </div>
      <p>The ultimate tool for quickly and flawlessly extracting dates from any webpage!</p>
    </header>

    <section class="container">
      <input type="url" id="urlInput" placeholder="Enter URL to scrape" />
      <button id="scrapeButton">Scrape</button>
      <div class="loader" id="loader"></div>
      <div id="scrapedData"></div>
    </section>

    <section id="downloadButtons" style="display: none; text-align: center; margin-top: 20px;">
      <button id="downloadPdfButton" >Download PDF</button>
      <button id="downloadCsvButton" >Download CSV</button>
  </section>
  
    <section id="datesList" style="display: none">
      <h3>Extracted Dates:</h3>
      <ul id="dateList"></ul>
    </section>

    <div class="footer">
      <div class="bubbles"></div>
      <div class="content">
        <div>
          <b>Date Scrapper App :</b>
          <a>© 2025 Scrapper</a>
        </div>
        <div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
